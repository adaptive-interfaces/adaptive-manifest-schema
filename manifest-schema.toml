# ============================================================
# manifest-schema.toml
# ============================================================
# Canonical adaptive-interfaces manifest schema definition.
# Defines required sections, fields, and validation rules for
# MANIFEST.toml files in the Adaptive Interfaces ecosystem.
#
# Navigation:
#   [meta]                schema identity
#   [manifest]            manifest file contract
#   [manifest.identity]   required top-level fields
#
#   FIELD DEFINITIONS     types and required status per field
#   CLASS REGISTRY        which sections each repo class requires
#   VALIDATION RULES      enforcement policy
#   NOTES                 non-goals and manifest role
# ============================================================

[meta]
schema = "adaptive-interfaces-manifest-schema"
version = "0.1.0"
status = "active"
title = "Adaptive Interfaces Manifest Schema"
manifest_schema_id = "adaptive-interfaces-manifest-schema-1"
purpose = "Defines required sections, fields, and validation rules for MANIFEST.toml across all adaptive-interfaces repos."

[manifest]
filename = "MANIFEST.toml"
human_legible = true
machine_readable = true
reviewable = true

[manifest.identity]
schema_field = "schema"
schema_required = true
schema_allowed = ["adaptive-interfaces-manifest-schema"]

schema_url_field = "schema_url"
schema_url_required = true

# ============================================================
# SECTION REGISTRY
# Defines what sections are permitted and what fields each contains.
# required = true means every repo of every class must include this section.
# required = false means the section is optional or class-specific.
# ============================================================

# --- Core sections (required for all classes) ---

[section.meta]
required = true
description = "Non-normative contextual information about the repo."
allowed_fields = ["purpose"]

[section.repo]
required = true
description = "Stable repository identity and declared class."
allowed_fields = [
    "name", "org", "class", "kind",
    "status", "since", "visibility", "summary",
]

[section.layer]
required = true
description = "Declared position in the ecosystem layer model."
allowed_fields = ["space", "role"]

[section.depends]
required = true
description = "Declared upstream dependencies."
allowed_fields = ["required", "optional"]

[section.provides]
required = true
description = "Artifacts intentionally provided and maintained."
allowed_fields = ["artifacts"]

[section.scope]
required = true
description = "Explicit scope declaration."
allowed_fields = ["includes", "excludes"]

[section.citation]
required = true
description = "Citation metadata pointer."
allowed_fields = ["cff", "preferred"]

# --- Proposed sections (adaptive-interfaces-manifest-2) ---
# These sections are in active use but not yet formally versioned.
# See DECISIONS.md D-007 and D-008.

[section.package]
required = false
description = "Python package identity and CLI configuration."
allowed_fields = ["python_name", "cli", "cli_entry", "cli_description"]

[section.docs]
required = false
description = "Documentation tooling configuration."
allowed_fields = ["enabled", "tool", "deploy"]

[section.ci]
required = false
description = "CI workflow configuration."
allowed_fields = ["link_check", "dependabot", "actionlint"]

[section.release]
required = false
description = "Release procedure configuration."
allowed_fields = ["validate_step", "changelog_sections"]

[section.agent]
required = false
description = """
Agent behavioral directives and safety constraints.
Declares what agents are authorized to do in this repo,
what checkpoints are required, and what paths are off-limits.
All fields are optional; omitting them does not grant permissions.
Conservative defaults apply when fields are absent.
See DECISIONS.md D-008 for rationale.
"""
allowed_fields = [
    "conformance",
    "skill",
    "permissions",
    "checkpoint",
    "scope",
    "sensitive_paths",
    "stop_on_ambiguity",
]

[section.conventions]
required = false
description = "Conventions source for ACS scaffold conformance."
allowed_fields = ["source"]

# ============================================================
# FIELD DEFINITIONS
# Defines the type and required status of each field within each section.
# Format: field_name = {type = "...", required = true|false}
# Allowed types: string, boolean, list[string], integer
# ============================================================

# --- Core section fields ---

[field.meta]
purpose = {type = "string", required = true}

[field.repo]
name = {type = "string", required = true}
org = {type = "string", required = true}
class = {type = "string", required = true}
kind = {type = "string", required = true}
status = {type = "string", required = true}
since = {type = "string", required = true}
visibility = {type = "string", required = false}
summary = {type = "string", required = false}

[field.layer]
space = {type = "string", required = true}
role = {type = "string", required = true}

[field.depends]
required = {type = "list[string]", required = true}
optional = {type = "list[string]", required = true}

[field.provides]
artifacts = {type = "list[string]", required = true}

[field.scope]
includes = {type = "list[string]", required = true}
excludes = {type = "list[string]", required = true}

[field.citation]
cff = {type = "string", required = true}
preferred = {type = "string", required = true}

# --- Proposed section fields ---

[field.package]
python_name = {type = "string", required = true}
cli = {type = "boolean", required = false}
cli_entry = {type = "string", required = false}
cli_description = {type = "string", required = false}

[field.docs]
enabled = {type = "boolean", required = true}
tool = {type = "string", required = false}
deploy = {type = "boolean", required = false}

[field.ci]
link_check = {type = "boolean", required = false}
dependabot = {type = "boolean", required = false}
actionlint = {type = "boolean", required = false}

[field.release]
validate_step = {type = "string", required = false}
changelog_sections = {type = "list[string]", required = false}

[field.agent]
# Behavioral protocol reference
conformance = {type = "string", required = false}
# WHY: URL to ACS or equivalent behavioral protocol.
# Agent must apply this protocol before generating any artifact.

skill = {type = "string", required = false}
# WHY: Path to the domain operating guide (SKILL.md).
# Agent reads this after ACS conformance is complete.

permissions = {type = "string", required = false}
# WHY: Declares the authorized operation scope for agents in this repo.
# Allowed values:
#   read-only        inspect and analyze; no artifact generation
#   read-generate    read files and produce new artifacts; no direct writes (default)
#   read-write       explicit tasks that modify existing files; requires DECISIONS.md entry
# Omitting this field implies read-generate.

checkpoint = {type = "string", required = false}
# WHY: Declares the required human review checkpoint before agent output is applied.
# Allowed values:
#   human-review-required    all output reviewed before applying (default)
#   automated                CI-gated; no human review required
# Omitting this field implies human-review-required.

scope = {type = "string", required = false}
# WHY: Declares the filesystem boundary for agent operations.
# Allowed values:
#   this-repo-only     agent operates only within this repository (default)
#   multi-repo         cross-repo operations permitted; must be named in task
# Omitting this field implies this-repo-only.

sensitive_paths = {type = "list[string]", required = false}
# WHY: Paths the agent must not read, reproduce, or reference.
# Agent must stop and request human guidance if a task requires access.
# Example: ["data/", ".env", "secrets/", "credentials/"]

stop_on_ambiguity = {type = "boolean", required = false}
# WHY: When true, agent must stop and report rather than guess
# when task scope is unclear or evidence is insufficient.
# Omitting this field implies true.

[field.conventions]
source = {type = "string", required = true}
# WHY: URL or path to the conventions source repo.
# Agent clones this and applies ACS conformance before scaffolding.

# ============================================================
# CLASS REGISTRY
# Defines which sections are required, optional, or forbidden
# for each declared repo class.
# ============================================================

[class.library]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["package", "docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.simulation]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["package", "docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.schema]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["package", "docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.guide]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.example]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["package", "docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.skill]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

[class.lab]
required_sections = ["meta", "repo", "layer", "depends", "provides", "scope", "citation"]
optional_sections = ["package", "docs", "ci", "release", "agent", "conventions"]
forbidden_sections = []

# ============================================================
# VALIDATION RULES
# Controls how strictly the validator enforces the schema.
# ============================================================

[validation]
require_known_sections_only = false
# WHY: false allows proposed sections to pass validation while manifest-2 is pending.
# Set to true once manifest-2 is finalized.

require_known_fields_only = false
# WHY: Same rationale as require_known_sections_only.

require_single_repo_class = true
require_repo_name_to_match_declared_class = false
require_declared_class_to_exist_in_class_registry = true
require_manifest_filename_exact = true

[validation.defaults]
empty_optional_lists_allowed = true
empty_required_lists_allowed = true

# ============================================================
# NOTES
# ============================================================

[notes]
manifest_role = "Declares repository identity, scope, role, and tooling configuration."
non_goals = [
    "build configuration",
    "deployment configuration",
    "runtime secrets",
    "replace README documentation",
    "replace CITATION.cff",
]
