# ============================================================
# .pre-commit-config.yaml (adaptive-manifest-schema)
# ============================================================
# VARIANT: adaptive-manifest-schema
# Updated: 2026-05-03

exclude: |
  (?x)^(
    \.DS_Store|
    \.coverage|
    \.ipynb_checkpoints/|
    \.mypy_cache/|
    \.nox/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.tox/|
    \.venv/|
    .*\.(egg-info)/|
    __pycache__/|
    build/|
    coverage\.xml|
    dist/|
    htmlcov/|
    node_modules/|
    site/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: A1) Clean trailing whitespace (per .editorconfig)
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        name: A2) End files with a newline (per .gitattributes)
      - id: check-json
        name: B1) Validate JSON syntax (except .vscode/)
        exclude: ^(\.vscode/.*\.json)$
      - id: check-toml
        name: B2) Validate TOML syntax
      - id: check-yaml
        name: B3) Validate YAML syntax
        files: \.(yml|yaml)$
        exclude: ^(\.vscode/)
      - id: check-added-large-files
        name: C1) Prevent accidental commits of large binaries
        args: [--maxkb=2000]
      - id: check-merge-conflict
        name: C2) Prevent committing merge conflicts
      - id: check-case-conflict
        name: C3) Check for filename case conflicts

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        name: D1) Ruff linter with autofix (runs first in pre-commit)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: D2) Ruff formatter (runs after linter fixes)

  - repo: local
    hooks:
      - id: adaptive-manifest-validate
        name: E1) Validate MANIFEST.toml against adaptive-interfaces schema
        language: system
        entry: uv run adaptive-manifest validate
        pass_filenames: false
        always_run: true

      - id: markdownlint
        name: E2) Markdown lint
        language: system
        entry: npx markdownlint-cli "**/*.md" --fix
        pass_filenames: false
        always_run: true

fail_fast: false
